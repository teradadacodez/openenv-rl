name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: huggingface/hub-sync@v1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: teradada-ai/OpenEnv-Agent
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space # can also be 'model' or 'dataset'
